name: voit
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  file_picker: ^8.1.7
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_riverpod: ^2.6.1
  ffmpeg_kit_flutter_min_gpl: ^6.0.3
  image_picker: ^1.1.2
  riverpod_annotation: ^2.6.1
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  test: ^1.24.9
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

flutter_icons:
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon.png"
